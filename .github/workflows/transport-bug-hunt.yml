name: Transport Bug Hunt

on:
  pull_request:
    paths:
      - "src/openclaw/**"
      - "src/processor/**"
      - "src/push/**"
      - "src/relayChannel/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/transport-bug-hunt.yml"
  workflow_dispatch:

jobs:
  transport-bug-hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:transport
